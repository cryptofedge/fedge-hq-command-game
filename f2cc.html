<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEDGE 2.O — Command Center</title>
<style>
:root{
  --bg:#07070f;--s1:#0d0d1e;--s2:#111126;--b1:#1a1a35;--b2:#26264a;
  --txt:#e8e9f4;--muted:#5a5a80;
  --purple:#7c3aed;--purple2:#4f46e5;
  --grad:linear-gradient(135deg,#7c3aed,#4f46e5);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;font-size:14px;}
a{color:inherit;text-decoration:none;}
button,input{font:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}
#shell{display:grid;grid-template-columns:240px 1fr;grid-template-rows:58px 1fr;height:100vh;overflow:hidden;}
header{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:0 20px;border-bottom:1px solid var(--b1);background:var(--s1);z-index:20;}
.hdr-logo{height:28px;width:auto;filter:drop-shadow(0 0 8px rgba(124,58,237,.5));}
.hdr-divider{width:1px;height:22px;background:var(--b2);}
.hdr-title{font-size:13px;font-weight:800;color:var(--txt);letter-spacing:-.2px;}
.hdr-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#4ade80;margin-left:4px;}
.hdr-status::before{content:'';width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-date{margin-left:auto;font-size:11px;color:var(--muted);}
.hdr-tab{background:transparent;border:1px solid var(--b2);border-radius:8px;padding:5px 12px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;margin-left:8px;}
.hdr-tab:hover,.hdr-tab.active{border-color:var(--purple);color:var(--txt);background:rgba(124,58,237,.1);}
aside{background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;display:flex;flex-direction:column;}
.side-sec{padding:14px 12px 6px;}
.side-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;padding:0 2px;}
.repo-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .1s;border:none;background:transparent;color:var(--txt);text-align:left;margin-bottom:2px;}
.repo-btn:hover{background:var(--s2);}
.repo-btn.active{background:var(--s2);border-left:2px solid var(--purple);padding-left:8px;}
.repo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.repo-info{min-width:0;flex:1;}
.repo-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.repo-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.repo-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;flex-shrink:0;}
.badge-live{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);}
.badge-dev{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2);}
.badge-priv{background:rgba(219,39,119,.1);color:#f472b6;border:1px solid rgba(219,39,119,.2);}
main{overflow-y:auto;display:flex;flex-direction:column;}
.repo-hero{display:flex;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;}
.repo-av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
.repo-hero-info{flex:1;min-width:0;}
.repo-hero-name{font-size:16px;font-weight:900;margin-bottom:3px;}
.repo-hero-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.repo-hero-links{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.link-btn{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--txt);cursor:pointer;transition:border-color .15s;text-decoration:none;}
.link-btn:hover{border-color:var(--purple);}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:0;flex:1;min-height:0;}
.panel{padding:20px 24px;overflow-y:auto;}
.panel-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;}
.action-grid{display:grid;gap:8px;}
.action-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:13px 15px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:flex-start;gap:12px;}
.action-card:hover{border-color:var(--purple2);background:#13132a;}
.action-card:active{transform:scale(.99);}
.ac-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.ac-body{min-width:0;}
.ac-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.ac-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.ctx-block{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-bottom:12px;}
.ctx-block-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;}
.ctx-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ctx-row:last-child{margin-bottom:0;}
.ctx-key{font-size:11px;color:var(--muted);}
.ctx-val{font-size:11px;font-weight:700;color:var(--txt);}
.ctx-val a{color:#93c5fd;}
.ctx-val a:hover{text-decoration:underline;}
.prog-track{height:4px;background:var(--b2);border-radius:4px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:4px;}
.tech-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.tech-chip{background:var(--b1);border:1px solid var(--b2);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--muted);}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--grad);color:#fff;border-radius:12px;padding:12px 22px;font-size:13px;font-weight:800;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(124,58,237,.4);pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 24px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.kpi{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;}
.kpi-val{font-size:22px;font-weight:900;line-height:1;margin-bottom:3px;}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
#view-all{display:none;padding:20px 24px;overflow-y:auto;}
.all-section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--b1);}
.all-section-title:first-child{margin-top:0;}
.all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:4px;}
.all-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;gap:10px;}
.all-card:hover{border-color:var(--purple2);}
.all-card-top{display:flex;align-items:center;gap:10px;}
.all-card-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;}
.all-card-info{flex:1;min-width:0;}
.all-card-name{font-size:13px;font-weight:800;margin-bottom:2px;}
.all-card-repo{font-size:10px;color:var(--muted);}
.all-card-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.all-card-bottom{display:flex;gap:6px;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="shell">

<header>
  <img class="hdr-logo" id="hdr-logo" src="" alt="FEDGE 2.O"/>
  <div class="hdr-divider"></div>
  <div class="hdr-title">Command Center</div>
  <div class="hdr-status">ONLINE</div>
  <div class="hdr-date" id="hdr-date"></div>
  <button class="hdr-tab active" onclick="showView('repo')" id="tab-repo">Command</button>

</header>

  </div>
</aside>

</div>

function showView(v){
  document.getElementById('view-repo').style.display=v==='repo'?'flex':'none';
  document.getElementById('view-all').style.display=v==='all'?'block':'none';
  document.getElementById('tab-repo').classList.toggle('active',v==='repo');
  document.getElementById('tab-all').classList.toggle('active',v==='all');
  if(v==='all') renderAllRepos();
}

function selectRepo(id){
  const r=REPOS[id]; if(!r) return;
  document.querySelectorAll('.repo-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  const av=document.getElementById('hero-av');
  av.textContent=r.avatar; av.style.background=r.color+'22'; av.style.border='1px solid '+r.color+'44'; av.style.color=r.color;
  document.getElementById('hero-name').textContent=r.name;
  document.getElementById('hero-desc').textContent=r.desc;
  document.getElementById('kpi-progress').textContent=r.progress+'%';
  const links=document.getElementById('hero-links');
  links.innerHTML='';
  if(r.github) links.innerHTML+=`<a class="link-btn" href="${r.github}" target="_blank" rel="noreferrer">⎇ GitHub</a>`;
  if(r.live)   links.innerHTML+=`<a class="link-btn" href="${r.live}" target="_blank" rel="noreferrer">🌐 Live</a>`;
  const ag=document.getElementById('action-grid'); ag.innerHTML='';
  (r.actions||[]).forEach(a=>{
    const d=document.createElement('div'); d.className='action-card';
    d.onclick=()=>copyPrompt(a.prompt);
    d.innerHTML=`<div class="ac-icon">${a.icon}</div><div class="ac-body"><div class="ac-title">${a.title}</div><div class="ac-desc">${a.desc}</div></div>`;
    ag.appendChild(d);
  });
  const cp=document.getElementById('ctx-panel'); cp.innerHTML='';
  const db=makeCtxBlock('Project Details');
  db.innerHTML+=ctxRow('Repo',r.repo);
  db.innerHTML+=ctxRow('Branch',r.branch||'main');
  db.innerHTML+=ctxRow('Status',r.status==='live'?'🟢 Live':r.status==='private'?'🔒 Private':'🟡 In Development');
  if(r.live) db.innerHTML+=ctxRow('Live URL',`<a href="${r.live}" target="_blank">${r.live.replace('https://','')}</a>`);
  db.innerHTML+=ctxRow('Progress',r.progress+'%');
  db.innerHTML+=`<div class="prog-track"><div class="prog-fill" style="width:${r.progress}%;background:${r.color}"></div></div>`;
  cp.appendChild(db);
  if(r.tech&&r.tech.length){
    const tb=makeCtxBlock('Tech Stack');
    tb.innerHTML+=`<div class="tech-chips">${r.tech.map(t=>`<span class="tech-chip">${t}</span>`).join('')}</div>`;
    cp.appendChild(tb);
  }
  if(r.repo&&r.path&&r.branch){
    const pb=makeCtxBlock('Push Pattern');
    pb.innerHTML+=`<div style="font-size:10px;color:var(--muted);line-height:1.8;word-break:break-all;"><code style="background:var(--b1);border-radius:4px;padding:2px 6px;color:#93c5fd;">gh api --method PUT repos/cryptofedge/${r.repo}/contents/${r.path}</code><div style="margin-top:6px;">Branch: <strong style="color:var(--txt);">${r.branch}</strong></div></div>`;
    cp.appendChild(pb);
  }
  showView('repo');
}

function makeCtxBlock(title){
  const b=document.createElement('div'); b.className='ctx-block';
  b.innerHTML=`<div class="ctx-block-title">${title}</div>`; return b;
}
function ctxRow(key,val){
  return `<div class="ctx-row"><span class="ctx-key">${key}</span><span class="ctx-val">${val}</span></div>`;
}

function renderAllRepos(){
  renderGrid('all-games', Object.entries(REPOS).filter(([,r])=>r.status==='live'));
  renderGrid('all-dev',   Object.entries(REPOS).filter(([,r])=>r.status==='dev'));
  renderGrid('all-private',Object.entries(REPOS).filter(([,r])=>r.status==='private'));
}
function renderGrid(cid,entries){
  const g=document.getElementById(cid); g.innerHTML='';
  entries.forEach(([id,r])=>{
    const d=document.createElement('div'); d.className='all-card'; d.onclick=()=>selectRepo(id);
    d.innerHTML=`<div class="all-card-top"><div class="all-card-av" style="background:${r.color}22;border:1px solid ${r.color}44;color:${r.color}">${r.avatar}</div><div class="all-card-info"><div class="all-card-name">${r.name}</div><div class="all-card-repo">${r.repo}</div></div></div><div class="all-card-desc">${r.desc}</div><div class="all-card-bottom">${r.live?`<a class="link-btn" href="${r.live}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">🌐 Live</a>`:''}<a class="link-btn" href="${r.github}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">⎇ GitHub</a><div class="repo-badge ${r.status==='live'?'badge-live':r.status==='private'?'badge-priv':'badge-dev'}" style="margin-left:auto;">${r.status==='live'?'Live':r.status==='private'?'Private':r.progress+'%'}</div></div>`;
    g.appendChild(d);
  });
}

function copyPrompt(text){
  navigator.clipboard.writeText(text).then(()=>showToast('✅','Prompt copied — paste in Claude Code')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅','Prompt copied — paste in Claude Code');
  });
}

let toastTimer;
function showToast(icon,msg){
  document.getElementById('toast-icon').textContent=icon;
  document.getElementById('toast-msg').textContent=msg;
  const t=document.getElementById('toast'); t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

function tick(){
  document.getElementById('hdr-date').textContent=
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+
    '  '+new Date().toLocaleTimeString('en-US',{hour12:false});
}
tick(); setInterval(tick,1000);
